name: Maxed Snake

on:
  schedule:
    - cron: "0 */12 * * *" # runs every 12h
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: Platane/snk@v3
        with:
          github_user_name: vedh-sonawane
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=ff0080&color_dots=#0c1b0a,#0d2c0b,#0f3d0c,#1f8a1e,#32e02f&trail=5&trail_color=ff00ff
            dist/github-contribution-grid-snake.svg?palette=github&color_snake=00ffff&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39&trail=5&trail_color=00ffdd

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
