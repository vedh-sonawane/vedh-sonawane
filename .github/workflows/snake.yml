name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: vedh-sonawane
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00ffff&color_dots=#0b0f1a,#0f172a,#1e293b,#38bdf8,#22d3ee
            dist/github-contribution-grid-snake.svg?palette=github&color_snake=00ffff&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
