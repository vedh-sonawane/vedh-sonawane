name: Snake Animation MAX

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Generate Snake Animations
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: vedh-sonawane
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark&color_snake=#00d9ff&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
            dist/snake-rainbow.svg?color_snake=linear-gradient(90deg,#ff0080,#ff8c00,#ffd700,#00ff00,#00d9ff,#0080ff,#8000ff)&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
      
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
